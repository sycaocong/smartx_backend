version: '3.8'

services:
  matching-engine:
    build:
      context: .
      dockerfile: Dockerfile
    image: smartx/matching-engine:latest
    container_name: smartx-matching-engine
    ports:
      - "8080:8080"
      - "9090:9090"
    environment:
      - SERVER_HOST=0.0.0.0
      - SERVER_PORT=8080
      - MATCHING_SHARDS=8
      - LOG_LEVEL=info
    volumes:
      - ./config.toml:/app/config.toml:ro
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - smartx-network

networks:
  smartx-network:
    driver: bridge
